name: Release macOS App (Pro DMG)

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get Version from Tag
        id: get_version
        shell: bash
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"

      # ----------------------------
      # Build (unsigned)
      # ----------------------------
      - name: Build macOS App (archive, unsigned)
        shell: bash
        run: |
          set -euo pipefail
          xcodebuild archive \
            -project Glide.xcodeproj \
            -scheme Glide \
            -configuration Release \
            -archivePath ./build/Glide.xcarchive \
            -destination 'platform=macOS' \
            CODE_SIGNING_ALLOWED=NO

      - name: Prepare App Artifact
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p ./build/dist
          rm -rf ./build/dist/Glide.app
          cp -R ./build/Glide.xcarchive/Products/Applications/Glide.app ./build/dist/Glide.app

      # ----------------------------
      # Setup signing keychain + import Developer ID cert
      # ----------------------------
      - name: Setup signing keychain
        shell: bash
        run: |
          set -euo pipefail

          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain-db"
          KEYCHAIN_PASSWORD=""  # empty password for ephemeral keychain in CI

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -t 3600 -u "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user 2>/dev/null | tr '\n' ' ')
          security default-keychain -s "$KEYCHAIN_PATH"

          echo "${{ secrets.APPLE_SIGNING_P12 }}" | base64 --decode > "$RUNNER_TEMP/signing.p12"
          security import "$RUNNER_TEMP/signing.p12" \
            -k "$KEYCHAIN_PATH" \
            -P "${{ secrets.APPLE_SIGNING_P12_PASSWORD }}" \
            -T /usr/bin/codesign \
            -T /usr/bin/security

          # Allow codesign to access the key non-interactively
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          echo "Available signing identities:"
          security find-identity -v -p codesigning || true

      # ----------------------------
      # Codesign the .app (Developer ID Application + hardened runtime)
      # ----------------------------
      - name: Codesign app
        shell: bash
        run: |
          set -euo pipefail

          APP="./build/dist/Glide.app"

          # Pick the first Developer ID Application identity in the keychain
          SIGN_ID="$(security find-identity -v -p codesigning \
            | grep 'Developer ID Application' \
            | head -n 1 \
            | sed -E 's/.*"(.+)".*/\1/')"

          if [[ -z "${SIGN_ID:-}" ]]; then
            echo "ERROR: No 'Developer ID Application' identity found in keychain."
            security find-identity -v -p codesigning || true
            exit 1
          fi

          echo "Using signing identity: $SIGN_ID"

          # If you have entitlements, add: --entitlements path/to/entitlements.plist
          codesign --force --options runtime --timestamp --sign "$SIGN_ID" "$APP"

          # Verify signing
          codesign -vvv --deep --strict "$APP"
          codesign -dv --verbose=4 "$APP" 2>&1 | egrep 'Identifier=|TeamIdentifier=|Authority=|Runtime|Flags' || true

      # ----------------------------
      # Prepare App Store Connect API key for notarization (notarytool)
      # ----------------------------
      - name: Prepare App Store Connect API key
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/asc"
          echo "${{ secrets.ASC_PRIVATE_KEY_B64 }}" | base64 --decode > "$RUNNER_TEMP/asc/AuthKey.p8"
          chmod 600 "$RUNNER_TEMP/asc/AuthKey.p8"

      # ----------------------------
      # Notarize + staple the APP first (fast feedback)
      # ----------------------------
      - name: Notarize app (zip) and staple
        shell: bash
        run: |
          set -euo pipefail
          APP="./build/dist/Glide.app"
          ZIP="$RUNNER_TEMP/Glide.zip"

          ditto -c -k --sequesterRsrc --keepParent "$APP" "$ZIP"

          xcrun notarytool submit "$ZIP" \
            --key "$RUNNER_TEMP/asc/AuthKey.p8" \
            --key-id "${{ secrets.ASC_KEY_ID }}" \
            --issuer "${{ secrets.ASC_ISSUER_ID }}" \
            --wait

          xcrun stapler staple "$APP"
          xcrun stapler validate "$APP"

      # ----------------------------
      # Build DMG (after stapling app)
      # ----------------------------
      - name: Install create-dmg
        run: brew install create-dmg

      - name: Create Fancy DMG
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${{ steps.get_version.outputs.VERSION }}"

          create-dmg \
            --volname "Glide $VERSION" \
            --volicon "./build/dist/Glide.app/Contents/Resources/AppIcon.icns" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 100 \
            --icon "Glide.app" 175 120 \
            --hide-extension "Glide.app" \
            --app-drop-link 425 120 \
            "Glide-$VERSION.dmg" \
            ./build/dist/

          # Embed icon on DMG file so it shows in Finder (not just when mounted)
          icon_tmp=$(mktemp -t dmg-icon.XXXXXXXXXX.icns)
          rsrc_tmp=$(mktemp -t dmg-icon.XXXXXXXXXX.rsrc)
          trap "rm -f $icon_tmp $rsrc_tmp" EXIT
          cp ./build/dist/Glide.app/Contents/Resources/AppIcon.icns "$icon_tmp"
          sips -i "$icon_tmp" >/dev/null 2>&1
          DeRez -only icns "$icon_tmp" > "$rsrc_tmp" 2>/dev/null
          Rez -append "$rsrc_tmp" -o "Glide-$VERSION.dmg"
          SetFile -a C "Glide-$VERSION.dmg"

      # ----------------------------
      # Notarize + staple the DMG (best UX for users)
      # ----------------------------
      - name: Notarize DMG and staple
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${{ steps.get_version.outputs.VERSION }}"
          DMG="Glide-$VERSION.dmg"

          xcrun notarytool submit "$DMG" \
            --key "$RUNNER_TEMP/asc/AuthKey.p8" \
            --key-id "${{ secrets.ASC_KEY_ID }}" \
            --issuer "${{ secrets.ASC_ISSUER_ID }}" \
            --wait

          xcrun stapler staple "$DMG"
          xcrun stapler validate "$DMG"

      # ----------------------------
      # Final verification (optional but helpful)
      # ----------------------------
      - name: Verify Gatekeeper acceptance (sanity check)
        shell: bash
        run: |
          set -euo pipefail
          APP="./build/dist/Glide.app"
          spctl -a -vvv --type exec "$APP" || true

      # ----------------------------
      # Release
      # ----------------------------
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: Glide-${{ steps.get_version.outputs.VERSION }}.dmg
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}